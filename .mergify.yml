queue_rules:
  - name: default
    merge_method: squash
    update_method: rebase
    # Batch up to 5 PRs together into a single CI run
    batch_size: 5
    # Wait up to 30 minutes to fill the batch before running CI
    batch_max_wait_time: 30 min
    queue_conditions:
      - check-success=Gitleaks - Secret Scanning
      - check-success=Prettier - Format Check
      - check-success=ESLint - Lint Code
      - check-success=TypeScript Compiler - Type Check
      - check-success=Vitest - Unit Tests
      - check-success=Vitest - Storybook Tests
      - check-success=Docker Build & E2E Tests
      - check-success=Semgrep - SAST & SCA
      - check-success=Trivy - Vulnerability Scan
      - check-success=Trivy - License Scan
      - check-success=Trivy - Config Scan
      - check-success=Trivy - CIS Docker Benchmark

# Security PRs get high priority in the queue
priority_rules:
  - name: security-high-priority
    conditions:
      - label = security
    priority: high

pull_request_rules:
  # Security PRs: high priority - processed before regular PRs in the queue
  - name: Queue Renovate security PRs with high priority
    conditions:
      - author = renovate[bot]
      - label = automerge
      - label = security
      - check-success=Gitleaks - Secret Scanning
      - check-success=Prettier - Format Check
      - check-success=ESLint - Lint Code
      - check-success=TypeScript Compiler - Type Check
      - check-success=Vitest - Unit Tests
      - check-success=Vitest - Storybook Tests
      - check-success=Docker Build & E2E Tests
      - check-success=Semgrep - SAST & SCA
      - check-success=Trivy - Vulnerability Scan
      - check-success=Trivy - License Scan
      - check-success=Trivy - Config Scan
      - check-success=Trivy - CIS Docker Benchmark
      - check-success=Merge Confidence Check for Renovate PRs
    actions:
      queue:
        name: default

  # Regular Renovate PRs: batch and automerge
  - name: Queue Renovate automerge PRs
    conditions:
      - author = renovate[bot]
      - label = automerge
      - -label = security
      - check-success=Gitleaks - Secret Scanning
      - check-success=Prettier - Format Check
      - check-success=ESLint - Lint Code
      - check-success=TypeScript Compiler - Type Check
      - check-success=Vitest - Unit Tests
      - check-success=Vitest - Storybook Tests
      - check-success=Docker Build & E2E Tests
      - check-success=Semgrep - SAST & SCA
      - check-success=Trivy - Vulnerability Scan
      - check-success=Trivy - License Scan
      - check-success=Trivy - Config Scan
      - check-success=Trivy - CIS Docker Benchmark
      - check-success=Merge Confidence Check for Renovate PRs
    actions:
      queue:
        name: default
