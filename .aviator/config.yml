merge_rules:
  labels:
    trigger: "merge-queue"

  preconditions:
    number_of_approvals: 0
    use_github_mergeability: false

  merge_strategy:
    name: "squash"

  merge_commit:
    use_title_and_body: true

  merge_mode:
    type: "parallel"
    parallel_mode:
      batch_size: 1
      max_parallel_builds: 1
      max_requeue_attempts: 0
      override_required_checks:
        - "Prettier - Format Check"
        - "ESLint - Lint Code"
        - "TypeScript Compiler - Type Check"
        - "Docker Build & E2E Tests"
        - "Semgrep - SAST & SCA"
        - "Trivy - Vulnerability Scan"
        - "Trivy - License Scan"
        - "Trivy - Config Scan"
        - "Trivy - CIS Docker Benchmark"
        - "Vitest - Unit Tests"
        - "Storybook - Component Tests"
