merge_rules:
  labels:
    trigger: "merge-queue"

  preconditions:
    number_of_approvals: 0
    use_github_mergeability: false

  merge_strategy:
    name: "squash"

  merge_commit:
    use_title_and_body: true

  merge_mode:
    type: "parallel"
    parallel_mode:
      batch_size: 1
      max_parallel_builds: 1
      max_requeue_attempts: 0
      skip_draft_when_up_to_date: false
      override_required_checks:
        - name: "Docker Build & E2E Tests"
          acceptable_statuses:
            - success
        - name: "ESLint - Lint Code"
          acceptable_statuses:
            - success
        - name: "Prettier - Format Check"
          acceptable_statuses:
            - success
        - name: "Semgrep - SAST & SCA"
          acceptable_statuses:
            - success
        - name: "Trivy - CIS Docker Benchmark"
          acceptable_statuses:
            - success
        - name: "Trivy - Config Scan"
          acceptable_statuses:
            - success
        - name: "Trivy - License Scan"
          acceptable_statuses:
            - success
        - name: "Trivy - Vulnerability Scan"
          acceptable_statuses:
            - success
        - name: "TypeScript Compiler - Type Check"
          acceptable_statuses:
            - success
        - name: "Vitest - Unit Tests"
          acceptable_statuses:
            - success
        - name: "Storybook - Component Tests"
          acceptable_statuses:
            - success
        - name: "Semgrep PRO"
          acceptable_statuses:
            - success
        - name: "Trivy"
          acceptable_statuses:
            - success

scenarios:
  - name: "Auto-requeue Renovate PRs after conflict resolution"
    trigger:
      pull_request:
        synchronize:
    actions:
      - script: |
          if (event.pullRequest.user.login === "renovate[bot]") {
            $mergequeue.queue({});
          }
