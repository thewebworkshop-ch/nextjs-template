merge_rules:
  merge_mode:
    type: "default"

  update_latest: true

  merge_strategy:
    name: "squash"

  merge_commit:
    use_title_and_body: true

  labels:
    trigger: "merge-queue"

  preconditions:
    number_of_approvals: 0
    use_github_mergeability: false
    required_checks:
      - "Prettier - Format Check"
      - "ESLint - Lint Code"
      - "TypeScript Compiler - Type Check"
      - "Docker Build & E2E Tests"
      - "Semgrep - SAST & SCA"
      - "Trivy - Vulnerability Scan"
      - "Trivy - License Scan"
      - "Trivy - Config Scan"
      - "Trivy - CIS Docker Benchmark"
      - "Vitest - Unit Tests"
      - "Storybook - Component Tests"
      - "Semgrep PRO"
      - "Trivy"
