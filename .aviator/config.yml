merge_rules:
  labels:
    trigger: "merge-queue"

  preconditions:
    number_of_approvals: 0
    use_github_mergeability: false

  merge_strategy:
    name: "squash"

  merge_commit:
    use_title_and_body: true

  merge_mode:
    type: "parallel"
    parallel_mode:
      batch_size: 1
      max_parallel_builds: 1
      max_requeue_attempts: 0
      skip_draft_when_up_to_date: false
      override_required_checks:
        - name: "Docker Build & E2E Tests"
          acceptable_statuses:
            - success
        - name: "ESLint - Lint Code"
          acceptable_statuses:
            - success
        - name: "Prettier - Format Check"
          acceptable_statuses:
            - success
        - name: "Semgrep - SAST & SCA"
          acceptable_statuses:
            - success
        - name: "Trivy - CIS Docker Benchmark"
          acceptable_statuses:
            - success
        - name: "Trivy - Config Scan"
          acceptable_statuses:
            - success
        - name: "Trivy - License Scan"
          acceptable_statuses:
            - success
        - name: "Trivy - Vulnerability Scan"
          acceptable_statuses:
            - success
        - name: "TypeScript Compiler - Type Check"
          acceptable_statuses:
            - success
        - name: "Vitest - Unit Tests"
          acceptable_statuses:
            - success
        - name: "Storybook - Component Tests"
          acceptable_statuses:
            - success
        - name: "Semgrep PRO"
          acceptable_statuses:
            - success
        - name: "Trivy"
          acceptable_statuses:
            - success

scenarios:
  - name: "[DEBUG] Tag PRs removed from batch"
    trigger:
      mergequeue: removed_from_batch
    actions:
      - script: |
          $github.addLabel("was-in-batch");

  - name: "Mark Renovate CI failures"
    trigger:
      mergequeue: removed_from_batch
    actions:
      - script: |
          if (
            event.pullRequest.user.login === "renovate[bot]" &&
            event.pullRequest.state !== "merged"
          ) {
            $github.addLabel("pr-ci-failing");
          }

  - name: "[DEBUG] Dump synchronize event"
    trigger:
      pull_request: synchronize
    actions:
      - script: |
          if (event.pullRequest.user.login === "renovate[bot]") {
            $github.addComment(JSON.stringify(event));
          }

  - name: "Auto-requeue Renovate PRs after conflict resolution"
    trigger:
      pull_request: synchronize
    actions:
      - script: |
          if (event.pullRequest.user.login === "renovate[bot]") {
            const hasCiFailing = event.pullRequest.labels.some(l => l.name === "pr-ci-failing");
            if (!hasCiFailing) {
              // Case A: conflict rebase → re-queue
              $github.removeLabel("blocked");
            } else {
              // If lockfile-only rebase → do nothing
              // If version bump → remove pr-ci-failing and re-queue
              const diff = $github.compareCommits({ base: event.before, head: event.after });
              if (diff.files.some(f => f.filename === "package.json")) {
                $github.removeLabel("pr-ci-failing");
                $github.removeLabel("blocked");
              }
            }
          }
