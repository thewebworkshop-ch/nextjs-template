name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Run weekly on Monday at 4am UTC (6am Europe/Zurich)
    - cron: "0 4 * * 1"

jobs:
  trivy-vuln:
    if: "github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'"
    name: Trivy - Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Trivy
        run: |
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Run Trivy vulnerability scanning on repository
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          skip-setup-trivy: true
          scan-type: "fs"
          scan-ref: "."
          scanners: "vuln"
          format: "sarif"
          output: "trivy-vuln-repo-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          limit-severities-for-sarif: true
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: "trivy-vuln-repo-results.sarif"
          category: "trivy-vuln-repo"

  trivy-license:
    if: "github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'"
    name: Trivy - License Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Trivy
        run: |
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Run Trivy license scanning on repository
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          skip-setup-trivy: true
          scan-type: "fs"
          scan-ref: "."
          scanners: "license"
          format: "sarif"
          output: "trivy-license-repo-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          limit-severities-for-sarif: true
          exit-code: "1"

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: "trivy-license-repo-results.sarif"
          category: "trivy-license-repo"

  trivy-config:
    if: "github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'"
    name: Trivy - Config Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Trivy
        run: |
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Run Trivy misconfiguration scanning
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          skip-setup-trivy: true
          scan-type: "config"
          scan-ref: "."
          scanners: "misconfig"
          format: "sarif"
          output: "trivy-config-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          limit-severities-for-sarif: true
          exit-code: "1"

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: "trivy-config-results.sarif"
          category: "trivy-config"

  trivy-docker-benchmark:
    if: "github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'"
    name: Trivy - CIS Docker Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: false
          load: true
          tags: app:scan
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,mode=max,scope=docker-build

      - name: Install Trivy
        run: |
          curl -fsSL https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Run CIS Docker Benchmark
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          skip-setup-trivy: true
          image-ref: "app:scan"
          scan-type: "image"
          scanners: "misconfig"
          format: "json"
          output: "trivy-cis-results.json"
          exit-code: "0"
          trivy-config: ""
        env:
          TRIVY_COMPLIANCE: docker-cis-1.6.0

      - name: Check for CIS failures (ignore manual checks)
        if: always()
        run: |
          if [ ! -f trivy-cis-results.json ]; then
            echo "❌ CIS results file not found"
            exit 1
          fi
          CONTROL_COUNT=$(jq '.SummaryControls | length' trivy-cis-results.json 2>/dev/null || echo "0")
          if [ "$CONTROL_COUNT" -eq 0 ]; then
            echo "❌ Unexpected JSON structure - SummaryControls missing or empty"
            exit 1
          fi
          FAIL_COUNT=$(jq '[.SummaryControls[] | select(has("TotalFail") and .TotalFail > 0)] | length' trivy-cis-results.json)
          echo "CIS checks with failures: $FAIL_COUNT (out of $CONTROL_COUNT controls)"
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "❌ CIS Docker Benchmark has $FAIL_COUNT failing checks"
            jq '.SummaryControls[] | select(has("TotalFail") and .TotalFail > 0) | {ID, Name, Severity, TotalFail}' trivy-cis-results.json
            exit 1
          fi
          echo "✅ All automated CIS Docker checks passed (manual checks skipped)"

  semgrep:
    if: "github.actor != 'renovate[bot]' && github.actor != 'dependabot[bot]'"
    name: Semgrep - SAST & SCA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Semgrep
        run: |
          semgrep ci \
            --sarif-output=semgrep-results.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload Semgrep results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: semgrep-results.sarif
          category: "semgrep"
