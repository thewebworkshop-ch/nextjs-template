name: Confidence

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main]

jobs:
  check-confidence:
    name: Merge Confidence Check for Renovate PRs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check Merge Confidence badges
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title || '';
            const branchName = context.payload.pull_request.head.ref || '';

            console.log('PR Title:', prTitle);
            console.log('Branch:', branchName);
            console.log('---');

            // Only check Renovate PRs - pass all others
            const isRenovatePR = branchName.startsWith('renovate/');
            if (!isRenovatePR) {
              console.log('✅ Not a Renovate PR - PASS');
              return;
            }

            // Determine update type from branch name and PR title
            const isGitHubActions = branchName.includes('github-actions') || prTitle.toLowerCase().includes('github actions');
            const isDocker = branchName.includes('docker') || prTitle.toLowerCase().includes('docker');
            const isNode = branchName.includes('node') && !branchName.includes('node_modules');
            const isLockfile = branchName.includes('lock-file-maintenance') || prTitle.toLowerCase().includes('lock file');

            // Infrastructure updates (GitHub Actions, Docker, Node, Lockfile) always pass
            // CI pipeline validates the actual changes
            if (isGitHubActions || isDocker || isNode || isLockfile) {
              console.log('✅ Infrastructure update (GitHub Actions/Docker/Node/Lockfile) - PASS');
              console.log('CI pipeline will validate the actual changes.');
              return;
            }

            // Extract Merge Confidence from PR body
            // NOTE: Renovate badge alt text is ALWAYS the static word "confidence" (not the level).
            // The actual confidence level is only in the dynamically served SVG image.
            // We fetch ALL badges (one per package in grouped PRs) and take the lowest level.

            // Find ALL confidence badge URLs
            // Tolerant pattern: handles both Markdown ![confidence](URL) and HTML <img src="URL">
            // and any Mend/Renovate domain variant
            const confidenceBadgePattern = /(https:\/\/[a-zA-Z0-9.-]+\/api\/mc\/badges\/confidence\/[^\s"'>)]+)/gi;
            const confidenceBadgeUrls = [...prBody.matchAll(confidenceBadgePattern)].map(m => m[1]);

            console.log('Confidence badges found:', confidenceBadgeUrls.length);
            confidenceBadgeUrls.forEach((url, i) => console.log(`  [DEBUG] Badge ${i + 1} raw: ${url}`));

            // Fetch confidence level for each badge and keep the lowest (most conservative)
            const levels = { 'very high': 4, 'high': 3, 'neutral': 2, 'low': 1 };
            let lowestConfidence = { level: 99, name: 'unknown' };
            let hasAnyBadge = confidenceBadgeUrls.length > 0;
            let allUnknown = true;
            let hasApiError = false;

            for (const rawBadgeUrl of confidenceBadgeUrls) {
              // Convert badge URL to data API URL: /api/mc/badges/confidence/ → /api/mc/confidence/
              // The badge endpoint only returns PNG-embedded SVG (not parseable)
              // The data endpoint returns JSON with the actual confidence level
              const dataUrl = rawBadgeUrl.split('?')[0].replace('/api/mc/badges/confidence/', '/api/mc/confidence/');
              const shortUrl = dataUrl.split('/').slice(-2).join('/');
              console.log(`  [DEBUG] Raw badge URL: ${rawBadgeUrl}`);
              console.log(`  [DEBUG] Data API URL: ${dataUrl}`);
              try {
                const response = await fetch(dataUrl, {
                  headers: { 'Accept': 'application/json' },
                  signal: AbortSignal.timeout(10000)
                });
                console.log(`  [DEBUG] HTTP status: ${response.status}`);
                console.log(`  [DEBUG] Content-Type: ${response.headers.get('content-type')}`);
                if (!response.ok) {
                  core.warning(`${shortUrl}: HTTP ${response.status}`);
                  hasApiError = true;
                  continue;
                }
                const body = await response.text();
                console.log(`  [DEBUG] Response body: ${body.substring(0, 500)}`);
                let levelName = null;
                try {
                  const json = JSON.parse(body);
                  console.log(`  [DEBUG] JSON parsed:`, JSON.stringify(json).substring(0, 200));
                  // Try common JSON shapes: {message}, {confidence}, {level}, {mergeConfidence}
                  const msg = (json.message || json.confidence || json.level || json.mergeConfidence || '').toLowerCase().trim();
                  console.log(`  [DEBUG] Extracted msg: "${msg}"`);
                  if (msg === 'very high') levelName = 'very high';
                  else if (msg === 'high') levelName = 'high';
                  else if (msg === 'neutral') levelName = 'neutral';
                  else if (msg === 'low') levelName = 'low';
                } catch (e) {
                  console.log(`  [DEBUG] Not JSON: ${body.substring(0, 300)}`);
                }

                if (levelName) {
                  allUnknown = false;
                  const levelNum = levels[levelName] ?? 0;
                  console.log(`  → ${shortUrl}: ${levelName}`);
                  if (levelNum < lowestConfidence.level) {
                    lowestConfidence = { level: levelNum, name: levelName };
                  }
                } else {
                  console.log(`  → ${shortUrl}: unknown (no confidence data in response)`);
                }
              } catch (err) {
                core.warning(`${shortUrl}: fetch failed - ${err.message}`);
                hasApiError = true;
              }
            }

            // Fail-closed: any fetch error = block immediately
            // We can't know if the failed badge would have been "low" → must not silently pass
            if (hasApiError) {
              core.setFailed('One or more confidence badge fetches failed - blocking to avoid passing with incomplete data.');
              return;
            }

            if (allUnknown) lowestConfidence = { level: 0, name: 'unknown' };

            const confidence = lowestConfidence;
            const hasHighConfidence = confidence.level >= 3; // High or Very High

            console.log('Lowest confidence across all packages:', confidence.name, `(level ${confidence.level})`);
            console.log('Has High+ Confidence:', hasHighConfidence);

            console.log('---');
            console.log('Applying rules...');

            // Rule 1: Confidence badge(s) present → require all >= High
            if (hasAnyBadge) {
              if (hasHighConfidence) {
                core.notice(`All packages Merge Confidence >= High (lowest: ${confidence.name}) - PASS`);
                return;
              } else if (confidence.name === 'unknown') {
                // Badges found but Mend has no data (e.g. packageManager type)
                // Fall through to no-badges logic
                console.log('Confidence badges found but Mend returned no data - falling back to no-badges logic');
              } else {
                core.setFailed(`Merge Confidence "${confidence.name}" is below High - waiting for confidence to improve`);
                return;
              }
            }

            // No badges - pass (Renovate's minimumReleaseAge already ensured sufficient wait)
            core.notice('No Merge Confidence badges - PASS (package not tracked by Mend)');
